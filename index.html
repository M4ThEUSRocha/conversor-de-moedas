<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Conversor de Moedas</title>
</head>
<img class="logo" src="./assets/logo.gif" alt="logo-convert-money">

<main>
    <label>
        Converter <b>de</b>
        <select>
            <option>R$ Real Brasileiro</option>
        </select>
    </label>

    <label>
        Converter <b>para</b>
        <select class="currency-select">
            <option value="dolar">U$ Dólar Americano</option>
            <option value="euro">€ Euro</option>
        </select>

    </label>

    <label>
        valor
        <input class="input-value" placeholder="R$ 10.000,00">
    </label>

    <button class="convert-button"> Converter</button>

    <section>
        <div class="currency-box">
            <img src="./assets/Real.png" alt="logo-moeda-a-converter">
            <p class="currency">Real</p>
            <p class="currency-value-to-convert">R$ 0,00</p>
        </div>

        <img class="arrow-img" src="./assets/seta.png" alt="seta">

        <div class="currency-box">
            <img class="currency-img" src="./assets/dollar.png" alt="logo-moeda-convertida">
            <p class="currency" id="currency-name">Dólar</p>
            <p class="currency-value">US$ 0.0</p>
        </div>
    </section>
</main>

<body>

</body>
<script src="./script.js"></script>

</html>
